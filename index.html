<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransferWatch — Tibia Arbitrage</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0c10; --bg-card: #12151c; --bg-card-hover: #181c26;
  --bg-input: #0e1118; --bg-expanded: #0f1219;
  --border: #1e2330; --border-focus: #3b82f6;
  --text: #e2e8f0; --text-dim: #64748b; --text-muted: #475569;
  --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.15);
  --green: #22c55e; --red: #ef4444; --gold: #f59e0b;
  --radius: 8px; --radius-lg: 12px;
}
html { font-size: 14px; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.app { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

.header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); }
.header-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), #6366f1); border-radius: var(--radius); display: grid; place-items: center; font-size: 1.4rem; flex-shrink: 0; }
.header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
.header h1 span { color: var(--accent); }
.header-sub { font-size: 0.85rem; color: var(--text-dim); }

.status-bar { display: flex; flex-wrap: wrap; gap: 0.4rem 1.5rem; padding: 0.65rem 1rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1.5rem; font-size: 0.78rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 0.3rem; vertical-align: middle; }
.dot-ok { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
.dot-wait { background: var(--gold); box-shadow: 0 0 6px rgba(245,158,11,0.3); }
.dot-err { background: var(--red); }

.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
@media (max-width: 600px) { .controls { grid-template-columns: 1fr; } }
.field label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
.field select, .field input { width: 100%; padding: 0.6rem 0.8rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
.field select:focus, .field input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-glow); }
.field select { cursor: pointer; }
.field select option { background: var(--bg-card); }

.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
.summary-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.85rem 1rem; }
.summary-card .label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.2rem; }
.summary-card .value { font-size: 1.25rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.gold-text { color: var(--gold); }
.green-text { color: var(--green); }

.world-list { display: flex; flex-direction: column; gap: 0.5rem; }
.world-group { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-card); overflow: hidden; transition: border-color 0.2s; }
.world-group:hover { border-color: #2a3040; }
.world-group.expanded { border-color: var(--accent); }
.world-header { display: grid; grid-template-columns: 2rem 1fr repeat(4, auto); gap: 1rem; align-items: center; padding: 0.85rem 1rem; cursor: pointer; user-select: none; transition: background 0.15s; }
.world-header:hover { background: var(--bg-card-hover); }
.world-header .arrow { font-size: 0.7rem; color: var(--text-muted); transition: transform 0.2s; text-align: center; }
.world-group.expanded .arrow { transform: rotate(90deg); color: var(--accent); }
.world-header .world-name-col { font-weight: 600; font-size: 0.95rem; }
.world-header .stat { text-align: right; white-space: nowrap; }
.world-header .stat .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.world-header .stat .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; font-weight: 600; }
.world-header .profit-value { color: var(--green); }
.badge { display: inline-block; padding: 0.12rem 0.4rem; border-radius: 4px; font-size: 0.68rem; font-weight: 600; margin-left: 0.4rem; vertical-align: middle; }
.badge-be-green { background: rgba(34,197,94,0.12); color: #4ade80; }
.badge-be-yellow { background: rgba(245,158,11,0.12); color: #fbbf24; }
.badge-pvp { background: rgba(139,92,246,0.12); color: #a78bfa; font-size: 0.65rem; }
.transfer-cost-note { font-size: 0.72rem; color: var(--text-muted); padding: 0.4rem 0.85rem; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }
.transfer-cost-note span { color: var(--gold); }

.world-items { display: none; border-top: 1px solid var(--border); background: var(--bg-expanded); overflow-x: auto; }
.world-group.expanded .world-items { display: block; }
.world-items table { width: 100%; border-collapse: collapse; }
.world-items thead th { padding: 0.55rem 0.85rem; text-align: left; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; }
.world-items tbody tr.item-row { border-bottom: 1px solid rgba(30,35,48,0.5); cursor: pointer; transition: background 0.15s; }
.world-items tbody tr.item-row:hover { background: rgba(59,130,246,0.06); }
.world-items tbody tr.item-row.expanded-item { background: rgba(59,130,246,0.04); }
.world-items td { padding: 0.5rem 0.85rem; white-space: nowrap; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
.world-items td.item-name-cell { font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 500; max-width: 250px; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.world-items td.item-name-cell .expand-hint { font-size: 0.65rem; color: var(--text-muted); margin-left: 0.3rem; }
.world-items td.profit-cell { color: var(--green); font-weight: 600; }

/* Buy offers breakdown */
.offers-row { display: none; }
.offers-row.visible { display: table-row; }
.offers-row td { padding: 0; }
.offers-detail { padding: 0.5rem 0.85rem 0.75rem 2.5rem; }
.offers-detail .offers-label { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 0.35rem; font-family: 'Outfit', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.offers-detail .loading-text { font-size: 0.78rem; color: var(--gold); font-family: 'JetBrains Mono', monospace; }
.offers-detail .error-text { font-size: 0.78rem; color: var(--red); font-family: 'JetBrains Mono', monospace; }
.offers-list { display: flex; flex-direction: column; gap: 0.25rem; }
.offer-entry { display: grid; grid-template-columns: 3rem 8rem 6rem 6rem 8rem; gap: 0.5rem; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; padding: 0.25rem 0; border-bottom: 1px solid rgba(30,35,48,0.3); }
.offer-entry:last-child { border-bottom: none; }
.offer-entry .offer-idx { color: var(--text-muted); }
.offer-entry .offer-price { color: var(--text); font-weight: 500; }
.offer-entry .offer-amount { color: var(--text-dim); }
.offer-entry .offer-margin { color: var(--green); }
.offer-entry .offer-margin.negative { color: var(--red); }
.offer-entry .offer-profit { color: var(--green); font-weight: 600; }
.offer-entry .offer-profit.negative { color: var(--red); }

.state-msg { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
.state-msg .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }

.filter-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; align-items: center; }
.filter-row label { font-size: 0.75rem; color: var(--text-dim); }
.filter-row input { padding: 0.3rem 0.5rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.82rem; outline: none; width: 140px; }
.filter-row input[type="number"] { width: 100px; font-family: 'JetBrains Mono', monospace; }

@media (max-width: 700px) {
  .world-header { grid-template-columns: 1.5rem 1fr repeat(2, auto); }
  .world-header .stat.hide-mobile { display: none; }
  .offer-entry { grid-template-columns: 2rem 6rem 5rem 5rem 6rem; font-size: 0.72rem; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">⚔️</div>
    <div>
      <h1>Transfer<span>Watch</span></h1>
      <div class="header-sub">Cross-world arbitrage — grupperat per målvärld</div>
    </div>
  </div>

  <div class="status-bar">
    <span><span class="dot dot-wait" id="dotData"></span>Data: <span id="statusData">laddar…</span></span>
    <span><span class="dot dot-wait" id="dotItems"></span>Items: <span id="statusItems">–</span></span>
    <span>Senaste scan: <strong id="statusScanAge">–</strong></span>
  </div>

  <div class="controls">
    <div class="field">
      <label>Startvärld</label>
      <select id="worldSelect" disabled><option value="">Laddar…</option></select>
    </div>
    <div class="field">
      <label>Tibia Coins att sälja</label>
      <input type="number" id="tcInput" value="250" min="1">
    </div>
  </div>

  <div class="summary" id="summaryRow" style="display:none;">
    <div class="summary-card"><div class="label">Gold-kapital</div><div class="value gold-text" id="sumGold">–</div></div>
    <div class="summary-card"><div class="label">Transfer-kostnad</div><div class="value gold-text" id="sumTransferCost">–</div></div>
    <div class="summary-card"><div class="label">Bästa målvärld</div><div class="value green-text" id="sumBestWorld">–</div></div>
    <div class="summary-card"><div class="label">Bästa nettoprofit</div><div class="value green-text" id="sumBestProfit">–</div></div>
    <div class="summary-card"><div class="label">Lönsamma världar</div><div class="value" id="sumWorldCount">–</div></div>
  </div>

  <div class="filter-row" id="filterRow" style="display:none;">
    <label>Sök item:</label>
    <input type="text" id="filterName" placeholder="Item-namn…">
    <label>Min nettoprofit:</label>
    <input type="number" id="filterMinProfit" value="0" placeholder="0">
  </div>

  <div id="resultsArea">
    <div class="state-msg"><div class="icon">📡</div><p>Laddar marknadsdata från Supabase…</p></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://vhvybrugkxkujgacekzi.supabase.co';
const SUPABASE_ANON = 'sb_publishable_viUDRVjIXhrfGYvde-gsRQ_anyvWNlB';
const MARKET_API    = 'https://api.tibiamarket.top:8001';

const TC_ITEM_ID = 22118;
const TRANSFER_COST_TC = 750;

const PVP_RANK = { 'Optional PvP': 0, 'Open PvP': 1, 'Retro Open PvP': 2, 'Retro Hardcore PvP': 3 };
const PVP_SHORT = { 'Optional PvP': 'Opt', 'Open PvP': 'Open', 'Retro Open PvP': 'R-Open', 'Retro Hardcore PvP': 'R-HC' };

const GREEN_BE = new Set([
  'Aethera','Blumera','Bravoria','Cantabra','Citra','Collabra','Descubra','Dia','Dracobra',
  'Eclipta','Escura','Etebra','Gladibra','Honbra','Hostera','Idyllia','Ignitera','Issobra',
  'Jadebra','Kalanta','Kalimera','Karmeya','Luzibra','Monstera','Mystera','Nevia','Noctalia',
  'Ombra','Ourobra','Penumbra','Quidera','Rasteibra','Retalia','Sombra','Sonira','Stralis',
  'Tempestera','Terribra','Tornabra','Unebra','Ustebra','Venebra','Victoris','Yovera','Yubra'
]);

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
let worldData = {};
let itemMeta  = {};
let worldGroups = [];
let transferCostGold = 0;   // calculated once per startvärld
let currentStartName = '';

// Cache for market_board results: "world:itemId" → offers array
const boardCache = {};

const $ = id => document.getElementById(id);
function formatGold(n) {
  if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return n.toLocaleString('sv-SE');
}
function getBE(name) { return GREEN_BE.has(name) ? 'green' : 'yellow'; }

function canTransfer(fromName, fromPvp, toName, toPvp) {
  const fr = PVP_RANK[fromPvp], tr = PVP_RANK[toPvp];
  if (fr === undefined || tr === undefined) return false;
  if (tr > fr) return false;
  if (getBE(fromName) === 'yellow' && getBE(toName) === 'green') return false;
  return true;
}

function timeAgo(dateStr) {
  const ms = Date.now() - new Date(dateStr).getTime();
  const mins = Math.round(ms / 60000);
  if (mins < 60) return mins + ' min sedan';
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return hrs + 'h sedan';
  return Math.round(hrs / 24) + 'd sedan';
}

// ═══════════════════════════════════════════════════════════════════════════
// THROTTLED API FETCH QUEUE
// ═══════════════════════════════════════════════════════════════════════════
const FETCH_DELAY_MS = 1500;
let fetchQueue = [];
let fetchRunning = false;

async function queueFetch(url) {
  return new Promise((resolve, reject) => {
    fetchQueue.push({ url, resolve, reject });
    processQueue();
  });
}

async function processQueue() {
  if (fetchRunning || fetchQueue.length === 0) return;
  fetchRunning = true;

  while (fetchQueue.length > 0) {
    const { url, resolve, reject } = fetchQueue.shift();
    try {
      const res = await fetch(url);
      if (res.status === 429) {
        await new Promise(r => setTimeout(r, 5000));
        const res2 = await fetch(url);
        if (!res2.ok) throw new Error('HTTP ' + res2.status);
        resolve(await res2.json());
      } else if (!res.ok) {
        throw new Error('HTTP ' + res.status);
      } else {
        resolve(await res.json());
      }
    } catch (e) {
      reject(e);
    }
    // Wait before next request
    if (fetchQueue.length > 0) {
      await new Promise(r => setTimeout(r, FETCH_DELAY_MS));
    }
  }
  fetchRunning = false;
}

// ═══════════════════════════════════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════════════════════════════════
async function loadData() {
  try {
    const items = await fetch('item_metadata.json').then(r => r.json());
    items.forEach(it => { itemMeta[it.id] = it; });
    $('statusItems').textContent = items.length;
    $('dotItems').className = 'dot dot-ok';
  } catch (e) {
    $('statusItems').textContent = 'FEL';
    $('dotItems').className = 'dot dot-err';
  }

  try {
    const url = SUPABASE_URL + '/rest/v1/world_market_data?select=world_name,pvp_type,items,scanned_at';
    const res = await fetch(url, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();

    rows.forEach(row => {
      worldData[row.world_name] = { pvp_type: row.pvp_type, items: row.items, scanned_at: row.scanned_at };
    });

    const count = Object.keys(worldData).length;
    $('statusData').textContent = count + ' världar';
    $('dotData').className = 'dot dot-ok';

    const times = rows.map(r => new Date(r.scanned_at).getTime());
    if (times.length) $('statusScanAge').textContent = timeAgo(new Date(Math.min(...times)).toISOString());

    const sel = $('worldSelect');
    sel.innerHTML = '<option value="">— Välj startvärld —</option>';
    Object.keys(worldData).sort().forEach(name => {
      const w = worldData[name];
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name + ' — ' + (PVP_SHORT[w.pvp_type] || w.pvp_type) + ' ' + (getBE(name) === 'green' ? '🟢' : '🟡');
      sel.appendChild(opt);
    });
    sel.disabled = false;

    $('resultsArea').innerHTML = '<div class="state-msg"><div class="icon">🔍</div><p>Välj startvärld ovan för att se lönsamma transfers.</p></div>';
  } catch (e) {
    $('statusData').textContent = 'FEL: ' + e.message;
    $('dotData').className = 'dot dot-err';
    $('resultsArea').innerHTML = '<div class="state-msg"><div class="icon">⚠️</div><p>Kunde inte ladda data.</p></div>';
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// CALCULATE — transfer cost at WORLD level, not per item
// ═══════════════════════════════════════════════════════════════════════════
function calculate() {
  const startName = $('worldSelect').value;
  const tcAmount = parseInt($('tcInput').value) || 0;
  if (!startName || tcAmount < 1) { worldGroups = []; renderResults(); return; }

  currentStartName = startName;
  const sw = worldData[startName];
  if (!sw) return;

  const startPrices = {};
  sw.items.forEach(it => { if (it.sell_offer > 0) startPrices[it.id] = it; });

  const tcItem = sw.items.find(it => it.id === TC_ITEM_ID);
  if (!tcItem || tcItem.buy_offer <= 0) {
    $('resultsArea').innerHTML = '<div class="state-msg"><div class="icon">⚠️</div><p>Ingen TC buy_offer på ' + startName + '.</p></div>';
    return;
  }
  const tcBuy = tcItem.buy_offer;
  const goldCap = tcAmount * tcBuy;
  transferCostGold = TRANSFER_COST_TC * tcBuy;

  worldGroups = [];
  for (const [tName, tw] of Object.entries(worldData)) {
    if (tName === startName) continue;
    if (!canTransfer(startName, sw.pvp_type, tName, tw.pvp_type)) continue;

    const trades = [];
    for (const tItem of tw.items) {
      if (!tItem.buy_offers || tItem.buy_offers <= 0 || tItem.buy_offer <= 0) continue;
      const sItem = startPrices[tItem.id];
      if (!sItem || tItem.buy_offer <= sItem.sell_offer) continue;

      const margin = tItem.buy_offer - sItem.sell_offer;
      const marginPct = (margin / sItem.sell_offer) * 100;
      const affordable = Math.floor(goldCap / sItem.sell_offer);
      const qty = Math.min(affordable, tItem.buy_offers);
      if (qty <= 0) continue;

      // Gross profit = margin × qty (NO transfer cost here)
      const grossProfit = qty * margin;
      if (grossProfit <= 0) continue;

      const meta = itemMeta[tItem.id];
      trades.push({
        item_id: tItem.id,
        item_name: meta ? (meta.wiki_name || meta.name) : '#' + tItem.id,
        buy_price: sItem.sell_offer,
        sell_price: tItem.buy_offer,
        margin, margin_pct: marginPct,
        qty, affordable,
        gross_profit: grossProfit,
        t_buy_offers: tItem.buy_offers,
        t_day_bought: tItem.day_bought || 0,
        s_sell_offers: sItem.sell_offers || 0,
        s_day_sold: sItem.day_sold || 0,
      });
    }
    if (!trades.length) continue;
    trades.sort((a, b) => b.gross_profit - a.gross_profit);

    const totalGross = trades.reduce((s, t) => s + t.gross_profit, 0);
    const netProfit = totalGross - transferCostGold;

    // Only show world if total profit covers transfer cost
    if (netProfit <= 0) continue;

    worldGroups.push({
      name: tName, pvp_type: tw.pvp_type, be: getBE(tName),
      trades, totalGross, netProfit,
      scanned_at: tw.scanned_at,
    });
  }
  worldGroups.sort((a, b) => b.netProfit - a.netProfit);

  $('summaryRow').style.display = 'grid';
  $('sumGold').textContent = formatGold(goldCap) + ' gp';
  $('sumTransferCost').textContent = formatGold(transferCostGold) + ' gp';
  $('sumBestWorld').textContent = worldGroups.length ? worldGroups[0].name : '–';
  $('sumBestProfit').textContent = worldGroups.length ? formatGold(worldGroups[0].netProfit) + ' gp' : '–';
  $('sumWorldCount').textContent = worldGroups.length;
  $('filterRow').style.display = 'flex';
  renderResults();
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════
function renderResults() {
  const area = $('resultsArea');
  const nameF = ($('filterName').value || '').toLowerCase();
  const minP = parseInt($('filterMinProfit').value) || 0;

  let filtered = worldGroups.filter(g => g.netProfit >= minP);
  if (nameF) filtered = filtered.filter(g => g.trades.some(t => t.item_name.toLowerCase().includes(nameF)));

  if (!filtered.length) {
    area.innerHTML = '<div class="state-msg"><div class="icon">🔍</div><p>' +
      (worldGroups.length ? 'Inga trades matchar filtret.' : 'Välj startvärld ovan.') + '</p></div>';
    return;
  }

  let h = '<div class="world-list">';
  for (const g of filtered) {
    const beE = g.be === 'green' ? '🟢' : '🟡';
    const pvp = PVP_SHORT[g.pvp_type] || g.pvp_type;
    let visT = nameF ? g.trades.filter(t => t.item_name.toLowerCase().includes(nameF)) : g.trades;

    h += '<div class="world-group" data-world="' + g.name + '">';
    h += '<div class="world-header" onclick="toggleGroup(this)">';
    h += '<span class="arrow">▶</span>';
    h += '<span class="world-name-col">' + g.name + ' <span class="badge badge-be-' + g.be + '">' + beE + '</span> <span class="badge badge-pvp">' + pvp + '</span></span>';
    h += '<span class="stat"><span class="stat-label">Trades</span><span class="stat-value">' + visT.length + '</span></span>';
    h += '<span class="stat hide-mobile"><span class="stat-label">Brutto</span><span class="stat-value">' + formatGold(g.totalGross) + '</span></span>';
    h += '<span class="stat hide-mobile"><span class="stat-label">Data</span><span class="stat-value">' + timeAgo(g.scanned_at) + '</span></span>';
    h += '<span class="stat"><span class="stat-label">Netto profit</span><span class="stat-value profit-value">' + formatGold(g.netProfit) + ' gp</span></span>';
    h += '</div>';

    h += '<div class="world-items">';
    h += '<div class="transfer-cost-note">Transfer: <span>' + formatGold(transferCostGold) + ' gp</span> (750 TC) dras en gång — netto = brutto − transfer</div>';
    h += '<table><thead><tr>';
    h += '<th></th><th>Item</th>';
    h += '<th title="Sell offer på startvärld">Köp (start)</th>';
    h += '<th title="Högsta buy offer på målvärld">Sälj (target)</th>';
    h += '<th title="Profit per styck">Marginal</th>';
    h += '<th title="Antal (cappat vid buy offers)">Antal</th>';
    h += '<th title="Bruttoprofit (marginal × antal)">Bruttoprofit</th>';
    h += '<th title="Aktiva buy offers på denna server">Buy offers</th>';
    h += '<th title="Sell offers på startvärld">Sell offers (S)</th>';
    h += '</tr></thead><tbody>';

    for (let i = 0; i < visT.length; i++) {
      const t = visT[i];
      const rowId = g.name + ':' + t.item_id;
      const marginCls = t.margin_pct >= 20 ? ' profit-cell' : '';

      h += '<tr class="item-row" data-row-id="' + rowId + '" data-world="' + g.name + '" data-item="' + t.item_id + '" data-buy-price="' + t.buy_price + '" onclick="toggleOffers(this)">';
      h += '<td style="font-size:0.65rem;color:var(--text-muted);width:1.5rem;">▶</td>';
      h += '<td class="item-name-cell" title="Klicka för buy offers breakdown">' + t.item_name + '</td>';
      h += '<td>' + t.buy_price.toLocaleString('sv-SE') + '</td>';
      h += '<td>' + t.sell_price.toLocaleString('sv-SE') + '</td>';
      h += '<td' + marginCls + '>' + formatGold(t.margin) + ' (' + t.margin_pct.toFixed(0) + '%)</td>';
      h += '<td>' + t.qty.toLocaleString('sv-SE') + '</td>';
      h += '<td class="profit-cell">' + formatGold(t.gross_profit) + ' gp</td>';
      h += '<td>' + t.t_buy_offers + '</td>';
      h += '<td>' + t.s_sell_offers + '</td>';
      h += '</tr>';

      // Expandable row for buy offers breakdown
      h += '<tr class="offers-row" id="offers-' + rowId.replace(/[^a-zA-Z0-9]/g, '_') + '"><td colspan="9"><div class="offers-detail">';
      h += '<div class="offers-label">Buy offers på ' + g.name + '</div>';
      h += '<div class="offers-content">Klicka för att ladda offers…</div>';
      h += '</div></td></tr>';
    }
    h += '</tbody></table></div></div>';
  }
  h += '</div>';
  area.innerHTML = h;
}

function toggleGroup(el) { el.closest('.world-group').classList.toggle('expanded'); }

// ═══════════════════════════════════════════════════════════════════════════
// TOGGLE ITEM → FETCH BUY OFFERS FROM /market_board
// ═══════════════════════════════════════════════════════════════════════════
async function toggleOffers(rowEl) {
  const rowId = rowEl.dataset.rowId;
  const safeId = 'offers-' + rowId.replace(/[^a-zA-Z0-9]/g, '_');
  const offersRow = document.getElementById(safeId);
  if (!offersRow) return;

  // Toggle visibility
  const isVisible = offersRow.classList.contains('visible');
  if (isVisible) {
    offersRow.classList.remove('visible');
    rowEl.classList.remove('expanded-item');
    rowEl.querySelector('td').textContent = '▶';
    return;
  }

  offersRow.classList.add('visible');
  rowEl.classList.add('expanded-item');
  rowEl.querySelector('td').textContent = '▼';

  const contentEl = offersRow.querySelector('.offers-content');
  const worldName = rowEl.dataset.world;
  const itemId = rowEl.dataset.item;
  const buyPrice = parseInt(rowEl.dataset.buyPrice);
  const cacheKey = worldName + ':' + itemId;

  // Already cached?
  if (boardCache[cacheKey]) {
    renderOffers(contentEl, boardCache[cacheKey], buyPrice);
    return;
  }

  // Fetch via throttled queue
  contentEl.innerHTML = '<span class="loading-text">⏳ Hämtar offers… (köad)</span>';

  try {
    const url = MARKET_API + '/market_board?server=' + encodeURIComponent(worldName) + '&item_id=' + itemId;
    const data = await queueFetch(url);

    // Response: { id, sellers: [...], buyers: [...], update_time }
    // buyers = people wanting to buy = we sell to them
    const buyOffers = (data.buyers || []).sort((a, b) => b.price - a.price);

    boardCache[cacheKey] = buyOffers;
    renderOffers(contentEl, buyOffers, buyPrice);
  } catch (e) {
    contentEl.innerHTML = '<span class="error-text">Fel: ' + e.message + '</span>';
  }
}

function renderOffers(el, offers, buyPrice) {
  if (!offers.length) {
    el.innerHTML = '<span class="loading-text">Inga buy offers hittades.</span>';
    return;
  }

  let h = '<div class="offers-list">';
  h += '<div class="offer-entry" style="font-weight:600;color:var(--text-dim);font-size:0.68rem;">';
  h += '<span>#</span><span>PRIS</span><span>ANTAL</span><span>MARGINAL</span><span>PROFIT</span>';
  h += '</div>';

  for (let i = 0; i < offers.length; i++) {
    const o = offers[i];
    const price = o.price || 0;
    const amount = o.amount || 1;
    const margin = price - buyPrice;
    const profit = margin * amount;
    const negCls = margin < 0 ? ' negative' : '';

    h += '<div class="offer-entry">';
    h += '<span class="offer-idx">' + (i + 1) + '</span>';
    h += '<span class="offer-price">' + price.toLocaleString('sv-SE') + ' gp</span>';
    h += '<span class="offer-amount">×' + amount.toLocaleString('sv-SE') + '</span>';
    h += '<span class="offer-margin' + negCls + '">' + (margin >= 0 ? '+' : '') + formatGold(margin) + '/st</span>';
    h += '<span class="offer-profit' + negCls + '">' + (profit >= 0 ? '+' : '') + formatGold(profit) + ' gp</span>';
    h += '</div>';
  }
  h += '</div>';
  el.innerHTML = h;
}

// Events
$('worldSelect').addEventListener('change', calculate);
$('tcInput').addEventListener('input', calculate);
$('filterName').addEventListener('input', renderResults);
$('filterMinProfit').addEventListener('input', renderResults);

// Init
loadData();
