name: Verify Targeted Trades

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'JSON array av {start, target, item_id}'
        required: true
        type: string

jobs:
  batch1:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
        working-directory: scanner
      - run: node scanner.js --targeted --batch=1/2
        working-directory: scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TARGETS_JSON: ${{ inputs.targets }}

  batch2:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
        working-directory: scanner
      - run: node scanner.js --targeted --batch=2/2
        working-directory: scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TARGETS_JSON: ${{ inputs.targets }}
