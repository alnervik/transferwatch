name: Scan Phase 2 Only

on:
  workflow_dispatch:  # Bara manuell trigger

jobs:
  phase2-batch1:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: scanner
        run: npm install
      - name: Run Phase 2 — Batch 1 (#1–85)
        working-directory: scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scanner.js --phase2 --skip=0 --take=85

  phase2-batch2:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: scanner
        run: npm install
      - name: Run Phase 2 — Batch 2 (#86–170)
        working-directory: scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scanner.js --phase2 --skip=85 --take=85

  phase2-batch3:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: scanner
        run: npm install
      - name: Run Phase 2 — Batch 3 (#171–255)
        working-directory: scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scanner.js --phase2 --skip=170 --take=85
